<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 击打计数</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fff8e1 0%, #ffe0b2 30%, #ffcc80 60%, #fff8e1 100%);
    background-size: 400% 400%;
    animation: bgShift 15s ease infinite;
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .container {
    text-align: center;
    max-width: 500px;
    width: 100%;
  }

  h1 {
    font-size: 28px;
    color: #e65100;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 13px;
    color: #bf360c;
    opacity: 0.7;
    margin-bottom: 24px;
  }

  /* counter */
  .counter-section {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(230, 81, 0, 0.12);
    border: 2px solid rgba(255, 152, 0, 0.2);
  }
  .count-display {
    font-size: 80px;
    font-weight: 900;
    background: linear-gradient(135deg, #e65100, #ff6d00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
    transition: transform 0.15s;
  }
  .count-display.bump { transform: scale(1.15); }
  .count-label {
    font-size: 13px;
    color: #bf360c;
    opacity: 0.6;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }

  /* image area */
  .image-area {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    transition: transform 0.1s;
  }
  .image-area:active { transform: scale(0.96); }
  .image-area img {
    width: 100%;
    display: block;
    pointer-events: none;
    border-radius: 20px;
  }
  /* click feedback */
  .click-fx {
    position: fixed; pointer-events: none; z-index: 999;
    font-weight: 900; font-size: 28px;
    animation: fxFly 0.9s ease-out forwards;
  }
  @keyframes fxFly {
    0%   { opacity: 1; transform: translate(0, 0) scale(0.5); }
    30%  { opacity: 1; transform: translate(var(--dx), -30px) scale(1.3); }
    100% { opacity: 0; transform: translate(var(--dx), -100px) scale(0.6); }
  }

  /* paw prints on image */
  .paw-print {
    position: absolute; pointer-events: none;
    font-size: 28px; opacity: 0;
    animation: pawPop 0.7s ease-out forwards;
  }
  @keyframes pawPop {
    0%   { opacity: 0; transform: scale(0.3) rotate(0deg); }
    40%  { opacity: 0.9; transform: scale(1.2) rotate(15deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(-15deg) translateY(-20px); }
  }

  /* buttons */
  .btn-row {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-top: 16px;
  }
  button {
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 10px 22px; border-radius: 20px; cursor: pointer;
    border: none; transition: all 0.2s;
  }
  .btn-reset {
    background: rgba(255,255,255,0.7); color: #e65100;
    border: 1.5px solid rgba(255, 152, 0, 0.25);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.95); }
  .btn-sound {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.7); color: #e65100;
    border: 1.5px solid rgba(255, 152, 0, 0.25);
    font-size: 18px; padding: 0; display: flex;
    align-items: center; justify-content: center;
  }
  .btn-sound.muted { opacity: 0.5; }

  .footer { font-size: 11px; color: #bf360c; opacity: 0.4; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">

  <h1>🐶 汪汪计数器</h1>
  <p class="subtitle">点击图片，听小狗叫 ~</p>

  <div class="counter-section">
    <div class="count-display" id="countDisplay">0</div>
    <div class="count-label">W O O F S</div>

    <div class="image-area" id="imageArea">
      <img id="mainImage" src="photos/1.jpg" alt="汪汪">
    </div>

    <div class="btn-row">
      <button class="btn-reset" onclick="resetCount()">🔄 归零</button>
      <button class="btn-sound" id="soundToggle" onclick="toggleSound()" title="切换音效">🔊</button>
    </div>
  </div>

  <p class="footer">点击图片即可计数 + 发出汪汪叫声 🦴</p>
</div>

<script>
// ====== state ======
let count = parseInt(localStorage.getItem('dog_count') || '0');
let soundEnabled = localStorage.getItem('dog_sound') !== 'false';

// ====== audio ======
function playBark() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // --- noise component (growl texture) ---
    const noiseLen = 0.25;
    const noiseBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * noiseLen), ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

    const noiseSrc = ctx.createBufferSource();
    noiseSrc.buffer = noiseBuf;

    // --- tonal component (woof) ---
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(350, now);
    osc.frequency.exponentialRampToValueAtTime(120, now + 0.22);

    // --- sub-bass thump ---
    const sub = ctx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(80, now);
    sub.frequency.exponentialRampToValueAtTime(40, now + 0.15);

    // --- filters ---
    const bpFilter = ctx.createBiquadFilter();
    bpFilter.type = 'bandpass';
    bpFilter.frequency.setValueAtTime(600, now);
    bpFilter.frequency.exponentialRampToValueAtTime(200, now + 0.25);
    bpFilter.Q.value = 1.8;

    const hpFilter = ctx.createBiquadFilter();
    hpFilter.type = 'highpass';
    hpFilter.frequency.value = 100;

    // --- gain envelope ---
    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0, now);
    masterGain.gain.linearRampToValueAtTime(0.5, now + 0.02);  // sharp attack
    masterGain.gain.setValueAtTime(0.5, now + 0.04);
    masterGain.gain.linearRampToValueAtTime(0.3, now + 0.12);  // sustain
    masterGain.gain.exponentialRampToValueAtTime(0.01, now + 0.28); // decay

    const subGain = ctx.createGain();
    subGain.gain.setValueAtTime(0, now);
    subGain.gain.linearRampToValueAtTime(0.3, now + 0.01);
    subGain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

    // --- routing ---
    osc.connect(bpFilter);
    noiseSrc.connect(bpFilter);
    bpFilter.connect(hpFilter);
    hpFilter.connect(masterGain);
    masterGain.connect(ctx.destination);

    sub.connect(subGain);
    subGain.connect(ctx.destination);

    // --- play ---
    osc.start(now); osc.stop(now + 0.3);
    noiseSrc.start(now); noiseSrc.stop(now + 0.3);
    sub.start(now); sub.stop(now + 0.18);

    // cleanup
    setTimeout(() => { if (ctx.state !== 'closed') ctx.close(); }, 500);
  } catch(e) {
    // AudioContext may not be available
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('dog_sound', soundEnabled);
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
}

// ====== counter ======
function updateDisplay() {
  const el = document.getElementById('countDisplay');
  el.textContent = count;
  localStorage.setItem('dog_count', count);
}

function increment(e) {
  count++;
  updateDisplay();
  playBark();

  // bump animation
  const display = document.getElementById('countDisplay');
  display.classList.remove('bump');
  void display.offsetWidth;
  display.classList.add('bump');

  // floating "+1" effect at click position
  spawnClickFx(e);

  // paw print on image
  spawnPawPrint(e);
}

function resetCount() {
  count = 0;
  updateDisplay();
}

// ====== visual fx ======
function spawnClickFx(e) {
  const fx = document.createElement('div');
  fx.className = 'click-fx';
  fx.textContent = '+1 🐾';
  fx.style.left = (e.clientX - 20) + 'px';
  fx.style.top = (e.clientY - 20) + 'px';
  fx.style.setProperty('--dx', ((Math.random() - 0.5) * 60) + 'px');
  document.body.appendChild(fx);
  setTimeout(() => fx.remove(), 900);
}

function spawnPawPrint(e) {
  const area = document.getElementById('imageArea');
  const rect = area.getBoundingClientRect();
  const paw = document.createElement('span');
  paw.className = 'paw-print';
  paw.textContent = '🐾';
  paw.style.left = (e.clientX - rect.left - 14) + 'px';
  paw.style.top = (e.clientY - rect.top - 14) + 'px';
  area.appendChild(paw);
  setTimeout(() => paw.remove(), 700);
}

// ====== click handler ======
document.getElementById('imageArea').addEventListener('click', function(e) {
  increment(e);
});

// Also allow clicking anywhere on the image area
document.getElementById('imageArea').addEventListener('mousedown', function(e) {
  // Prevent text selection during rapid clicks
  e.preventDefault();
});

// ====== init ======
updateDisplay();
document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
</script>
</body>
</html>
